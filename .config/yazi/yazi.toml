[opener]
edit = [
	{ run = 'nvim "$@"', block = true, for = "unix", desc = "Open in nvim" },
]
bat = [
	{ run = 'bat --paging=always "$@"', block = true, for = "unix", desc = "Open in bat" },
]

[open]
prepend_rules = [
	{ mime = "*pgp*", use = ["edit","reveal"] },
	{ mime = "text/*", use = ["edit", "bat", "reveal"] },
]

[mgr]
ratio = [1, 2, 3]
linemode = "size"

[plugin]
prepend_previewers = [
    # { name = "*.csv", run = "rich-preview"}, # for csv files
    { url = "*.md", run = "rich-preview" }, # for markdown (.md) files
    { url = "*.ipynb", run = "rich-preview"}, # for jupyter notebooks (.ipynb)
    # { name = "*.json", run = "rich-preview"}, # for json (.json) files
    # { name = "*.lang_type", run = "rich-preview"} # for particular language files eg. .py, .go., .lua, etc.
    { url = "*.html", run = "rich-preview"},
]

[[plugin.prepend_fetchers]]
url   = "local://*"
run   = "mime-ext.local"
prio  = "high"
group = "mime"

[[plugin.prepend_fetchers]]
url   = "remote://*"
run   = "mime-ext.remote"
prio  = "high"
group = "mime"

[preview]
wrap       = "yes"
max_width  = 1920
max_height = 1080
